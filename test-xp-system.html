<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XP System Test Suite</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #00ff88;
            text-align: center;
        }
        .test-section {
            background: #16213e;
            border: 2px solid #00ff88;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .test-case {
            background: #0f3460;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #00ff88;
        }
        .pass {
            color: #00ff88;
            font-weight: bold;
        }
        .fail {
            color: #ff4444;
            font-weight: bold;
        }
        .info {
            color: #ffaa00;
        }
        button {
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px;
        }
        button:hover {
            background: #00dd77;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }
        .stat-box {
            background: #0f3460;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .xp-bar {
            width: 100%;
            height: 30px;
            background: #0f3460;
            border: 2px solid #00ff88;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            margin: 10px 0;
        }
        .xp-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ddff);
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #1a1a2e;
        }
    </style>
</head>
<body>
    <h1>🎮 XP System Test Suite - 100s Scale 🎮</h1>
    
    <div class="test-section">
        <h2>Current Hero Stats</h2>
        <div class="stats">
            <div class="stat-box">
                <div>Level: <span id="currentLevel">1</span></div>
            </div>
            <div class="stat-box">
                <div>XP: <span id="currentXP">0</span></div>
            </div>
            <div class="stat-box">
                <div>HP: <span id="currentHP">100</span></div>
            </div>
            <div class="stat-box">
                <div>ATK: <span id="currentATK">15</span></div>
            </div>
        </div>
        <div class="xp-bar">
            <div class="xp-fill" id="xpBarFill" style="width: 0%">0%</div>
        </div>
        <div id="xpText" style="text-align: center; margin: 10px 0;">0/100 XP</div>
    </div>

    <div class="test-section">
        <h2>Quick Tests</h2>
        <button onclick="testBasicXPGain()">Test Basic XP Gain</button>
        <button onclick="testLevelUp()">Test Level Up</button>
        <button onclick="testMultipleLevelUps()">Test Multiple Level Ups</button>
        <button onclick="testLevel100Cap()">Test Level 100 Cap</button>
        <button onclick="testXPCarryOver()">Test XP Carry Over</button>
        <button onclick="testMigration()">Test Old Data Migration</button>
        <button onclick="runAllTests()">Run All Tests</button>
        <button onclick="resetHero()">Reset Hero</button>
    </div>

    <div class="test-section">
        <h2>Test Results</h2>
        <div id="testResults"></div>
    </div>

    <script type="module">
        import { Hero } from './js/hero.js';

        // Hero sprite paths (dummy for testing)
        const heroSprites = {
            idle: 'assets/heroes/hero-idle.png',
            attack: 'assets/heroes/hero-attack.png',
            hurt: 'assets/heroes/hero-hurt.png',
            celebrate: 'assets/heroes/hero-celebrate.png'
        };

        let testHero = new Hero('TestHero', heroSprites);
        window.testHero = testHero;

        function updateDisplay() {
            document.getElementById('currentLevel').textContent = testHero.level;
            document.getElementById('currentXP').textContent = testHero.xp;
            document.getElementById('currentHP').textContent = testHero.hp + '/' + testHero.maxHp;
            document.getElementById('currentATK').textContent = testHero.atk;

            const xpNeeded = testHero.xpNeededForNextLevel();
            const xpPercent = testHero.level >= 100 ? 100 : Math.min(100, (testHero.xp / xpNeeded) * 100);
            
            document.getElementById('xpBarFill').style.width = xpPercent + '%';
            document.getElementById('xpBarFill').textContent = Math.round(xpPercent) + '%';
            
            if (testHero.level >= 100) {
                document.getElementById('xpText').textContent = 'MAX LEVEL';
            } else {
                document.getElementById('xpText').textContent = testHero.xp + '/' + xpNeeded + ' XP';
            }
        }

        function logTest(testName, passed, message) {
            const resultsDiv = document.getElementById('testResults');
            const testCase = document.createElement('div');
            testCase.className = 'test-case';
            
            const status = passed ? '<span class="pass">✓ PASS</span>' : '<span class="fail">✗ FAIL</span>';
            testCase.innerHTML = `${status} - ${testName}<br><span class="info">${message}</span>`;
            
            resultsDiv.appendChild(testCase);
            updateDisplay();
        }

        window.resetHero = function() {
            testHero = new Hero('TestHero', heroSprites);
            window.testHero = testHero;
            updateDisplay();
            document.getElementById('testResults').innerHTML = '<div class="info">Hero reset to level 1</div>';
        };

        window.testBasicXPGain = function() {
            resetHero();
            const initialXP = testHero.xp;
            testHero.gainXP(50);
            const gained = testHero.xp - initialXP;
            logTest('Basic XP Gain', gained === 50, `Gained ${gained} XP (expected 50)`);
        };

        window.testLevelUp = function() {
            resetHero();
            const leveledUp = testHero.gainXP(100);
            const isLevel2 = testHero.level === 2;
            const xpCarried = testHero.xp === 0;
            logTest('Level Up', leveledUp && isLevel2 && xpCarried, 
                `Level: ${testHero.level} (expected 2), XP: ${testHero.xp} (expected 0), Leveled: ${leveledUp}`);
        };

        window.testMultipleLevelUps = function() {
            resetHero();
            testHero.gainXP(550); // Should reach level 4 with 50 XP remaining
            // Level 1: 100 XP needed, Level 2: 200 XP needed, Level 3: 300 XP needed = 600 total
            // 550 XP = Level 3 with 150 XP (100+200=300 used, 250 left, 250-200=50 at level 3)
            const correctLevel = testHero.level === 3;
            const correctXP = testHero.xp === 150;
            logTest('Multiple Level Ups', correctLevel && correctXP, 
                `Level: ${testHero.level} (expected 3), XP: ${testHero.xp} (expected 150)`);
        };

        window.testLevel100Cap = function() {
            resetHero();
            testHero.level = 99;
            testHero.xp = 0;
            testHero.gainXP(10000); // Try to gain massive XP
            const cappedAt100 = testHero.level === 100;
            const xpCapped = testHero.xp === testHero.xpNeededForNextLevel();
            logTest('Level 100 Cap', cappedAt100 && xpCapped, 
                `Level: ${testHero.level} (expected 100), XP: ${testHero.xp} (should be capped at ${testHero.xpNeededForNextLevel()})`);
            
            // Try to gain more XP at level 100
            const beforeXP = testHero.xp;
            testHero.gainXP(500);
            const noGainAtMax = testHero.xp === beforeXP;
            logTest('No XP Gain at Max Level', noGainAtMax, 
                `XP unchanged: ${testHero.xp} (should not increase from ${beforeXP})`);
        };

        window.testXPCarryOver = function() {
            resetHero();
            testHero.gainXP(250); // Should level to 2 with 50 XP remaining
            const correctLevel = testHero.level === 2;
            const correctXP = testHero.xp === 50;
            logTest('XP Carry Over', correctLevel && correctXP, 
                `Level: ${testHero.level} (expected 2), XP: ${testHero.xp} (expected 50 carried over)`);
        };

        window.testMigration = function() {
            resetHero();
            // Simulate old 1000s scale data
            const oldData = {
                name: 'OldHero',
                hp: 140,
                maxHp: 140,
                atk: 25,
                xp: 3500, // Old scale: 3500 XP
                level: 3,
                attackGauge: 100,
                defenseGauge: 100
            };
            
            // Simulate migration logic
            const expectedMaxXP = oldData.level * 100;
            let migratedXP = oldData.xp;
            if (oldData.xp > expectedMaxXP * 5) {
                migratedXP = Math.floor(oldData.xp / 10);
            }
            
            const correctMigration = migratedXP === 350;
            logTest('Old Data Migration', correctMigration, 
                `Old XP: ${oldData.xp} → New XP: ${migratedXP} (expected 350)`);
        };

        window.runAllTests = function() {
            document.getElementById('testResults').innerHTML = '';
            testBasicXPGain();
            setTimeout(() => testLevelUp(), 100);
            setTimeout(() => testMultipleLevelUps(), 200);
            setTimeout(() => testXPCarryOver(), 300);
            setTimeout(() => testLevel100Cap(), 400);
            setTimeout(() => testMigration(), 500);
        };

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
